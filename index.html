<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>台灣大學入學資料爬蟲儀表板</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* 前述相同 CSS，省略以節省空間 */
        body { font-family: "Microsoft JhengHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin: 40px 0; }
        .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .stat-number { font-size: 3.5em; font-weight: bold; color: #FFD700; margin-bottom: 8px; }
        .stat-label { font-size: 1.2em; opacity: 0.95; }
        .instructions { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; margin: 30px 0; }
        .csv-download { background: #4CAF50; color: white; padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-size: 1.1em; margin: 10px; }
        pre { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; overflow-x: auto; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 30px;">🕷️ 台灣大學入學爬蟲儀表板</h1>
        
        <div class="stats-grid">
            <div class="card">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">總公告筆數</div>
            </div>
            <div class="card">
                <div class="stat-number" id="y115-count">0</div>
                <div class="stat-label">115學年度</div>
            </div>
            <div class="card">
                <div class="stat-number" id="schools-count">0</div>
                <div class="stat-label">推估校數</div>
            </div>
        </div>
        
        <div class="instructions">
            <h3>📋 快速啟動步驟</h3>
            <ol>
                <li><strong>Codespaces</strong> → Terminal: <code>scrapy crawl jbcrc</code></li>
                <li>確認產生 <code>admissions.db</code>（約 50KB）</li>
                <li><button class="csv-download" onclick="generateCSV()">📥 下載 CSV 檢視</button></li>
                <li>或用 <code>sqlite3 admissions.db "SELECT * FROM jbcrc_notices LIMIT 10;"</code></li>
            </ol>
        </div>
        
        <pre id="sql-output">sqlite&gt; SELECT COUNT(*) FROM jbcrc_notices;<br>等待爬蟲執行...</pre>
    </div>

    <script>
        // 模擬統計（實際用 Python 生成）
        const demoData = [
            {title: '台大電機115招生公告', year: '115'},
            {title: '成大資工115簡章', year: '115'},
            {title: '清大機械114公告', year: '114'},
            {title: '政大企管115招生', year: '115'}
        ];
        
        // 更新統計
        document.getElementById('total-count').textContent = demoData.length;
        document.getElementById('y115-count').textContent = demoData.filter(d => d.year === '115').length;
        document.getElementById('schools-count').textContent = new Set(demoData.map(d => d.title.split(' ')[0])).size;
        
        document.getElementById('sql-output').innerHTML = `
sqlite&gt; SELECT COUNT(*) as total FROM jbcrc_notices;<br>
total<br>
4<br>
<br>
sqlite&gt; SELECT COUNT(*) FROM jbcrc_notices WHERE year='115';<br>
3<br>
<br>
sqlite&gt; SELECT DISTINCT title FROM jbcrc_notices LIMIT 5;<br>
台大電機115招生公告<br>
成大資工115簡章<br>
清大機械114公告<br>
政大企管115招生
        `;
        
        function generateCSV() {
            const csv = '標題,學年度,來源\n' + 
                demoData.map(d => `"${d.title}","${d.year}","jbcrc"`).join('\n');
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'admissions_115.csv';
            link.click();
        }
    </script>
</body>
</html>
