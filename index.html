<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>台灣大學入學爬蟲儀表板</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .stats-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-bottom: 40px;
        }
        .card { 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(20px); 
            border-radius: 20px; 
            padding: 40px 30px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        
        .stat-number { 
            font-size: 4em; 
            font-weight: bold; 
            color: #FFD700; 
            margin-bottom: 10px; 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
        }
        .stat-label { font-size: 1.3em; opacity: 0.95; }
        
        table { 
            width: 100%; 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        th { 
            background: rgba(255,255,255,0.2); 
            padding: 20px; 
            text-align: left; 
            font-weight: bold;
        }
        td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        tr:hover { background: rgba(255,255,255,0.1); }
        
        .refresh-btn { 
            position: fixed; 
            top: 30px; 
            right: 30px; 
            padding: 15px 30px; 
            background: linear-gradient(45deg, #4CAF50, #45a049); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.1em; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(76,175,80,0.4);
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(76,175,80,0.6); }
        
        .status { text-align: center; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } .stat-number { font-size: 2.5em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕷️ 台灣大學入學爬蟲儀表板</h1>
        
        <div
